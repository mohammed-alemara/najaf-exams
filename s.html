<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج رسمي للطباعة</title>

<!-- خط Cairo -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- مكتبة QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body {
    font-family: 'Cairo', sans-serif;
    background-color: #f4f4f4;
    padding: 20px;
}

.form-container {
    background: #fff;
    padding: 25px;
    max-width: 900px;
    margin: auto;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    font-weight: 700;
}

.form-row {
    display: flex;
    align-items: center;
    margin-top: 15px;
    gap: 10px;
}

.form-row label {
    width: 180px;
    font-weight: 600;
}

.form-row input,
.form-row textarea {
    flex: 1;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: 'Cairo', sans-serif;
}

.buttons {
    margin-top: 20px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
}

.print-btn {
    background-color: #28a745;
    color: white;
}

.reset-btn {
    background-color: #dc3545;
    color: white;
}

/* رأس الطباعة */
.print-header {
    display: none;
}

/* QR مخفي في الشاشة */
#printQR {
    display: none;
    text-align: center;
    margin-top: 30px;
}

/* إعدادات الطباعة */
@page {
    size: A4 landscape;
    margin: 5mm; /* تقليل الهوامش لأدنى حد آمن للطابعات */
}

@media print {

    html, body {
        width: 297mm;
        height: 210mm;
        margin: 0;
        padding: 0;
        background: white;
        font-family: 'Cairo', sans-serif;
    }

    .buttons {
        display: none;
    }

    .form-container {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 10mm 15mm;
        border: none;
        box-shadow: none;
    }

    /* الرأس */
    .print-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        padding-bottom: 12px;
        margin-bottom: 25px;
    }

    /* الخط الفاصل يمتد بعرض الورقة بالكامل */
    .print-header::after {
        content: "";
        position: absolute;
        bottom: 0;
        right: -15mm;
        left: -15mm;
        height: 3px;
        background: #000;
    }

    .header-right {
        text-align: right;
        font-size: 20pt;
        font-weight: 700;
        line-height: 1.6;
    }

    .header-left img {
        height: 90px;
    }

    #printQR {
        display: block;
        margin-top: 30px;
        text-align: center;
    }
}
}

</style>
</head>
<body>

<div class="form-container">

    <!-- رأس يظهر فقط في الطباعة -->
    <div class="print-header">
        <div class="header-right">
            <div>جمهورية العراق</div>
            <div>وزارة التربية</div>
        </div>

        <div class="header-left">
            <img src="images/logo.jpg" alt="شعار وزارة التربية">
        </div>
    </div>

    <h2>نموذج إدخال بيانات</h2>

    <form id="myForm">

        <div class="form-row">
            <label>الاسم الكامل:</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-row">
            <label>البريد الإلكتروني:</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-row">
            <label>رقم الهاتف:</label>
            <input type="tel" id="phone" required>
        </div>

        <div class="form-row">
            <label>ملاحظات:</label>
            <textarea id="notes" rows="3" required></textarea>
        </div>

        <!-- QR يظهر فقط في الطباعة -->
        <div id="printQR">
            <canvas id="qrCanvas"></canvas>
        </div>

        <div class="buttons">
            <button type="button" class="print-btn" onclick="validateAndPrint()">طباعة</button>
            <button type="reset" class="reset-btn">إعادة تعيين</button>
        </div>

    </form>

</div>

<script>

function generateQR() {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const notes = document.getElementById("notes").value.trim();

    const uniqueID = Date.now();

    const data = JSON.stringify({
        الاسم: name,
        البريد: email,
        الهاتف: phone,
        ملاحظات: notes,
        رقم_فريد: uniqueID
    });

    const canvas = document.getElementById("qrCanvas");

    QRCode.toCanvas(canvas, data, {
        width: 180,
        margin: 1,
        errorCorrectionLevel: 'H'
    });
}

function validateAndPrint() {

    const form = document.getElementById("myForm");

    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    generateQR();

    document.fonts.ready.then(() => {
        setTimeout(() => {
            window.print();
        }, 200);
    });
}

</script>

</body>
</html>
