<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الموظفين - التحديث النهائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 15px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #dee2e6; }
        input, select { flex: 1; min-width: 130px; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; outline: none; font-size: 12px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        #addBtn { background: #28a745; color: white; }
        #sendBtn { background: #1a73e8; color: white; width: 100%; margin-top: 25px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        th, td { padding: 8px; border-bottom: 1px solid #dee2e6; text-align: center; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #e9ecef; color: #495057; }
        .delete { background: #dc3545; color: white; }
        .edit { background: #ffc107; color: #212529; margin-left: 5px; }
        .save { background: #17a2b8; color: white; margin-left: 5px; }
        #overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); z-index:90; border-radius: 15px; }
        #loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #1a73e8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h3>إدخال بيانات الموظفين الشامل</h3>
    <div class="input-group">
        <input id="name" placeholder="اسم الموظف">
        <select id="job">
            <option value="" disabled selected>الوظيفة...</option>
            <option value="مدير">مدير</option>
            <option value="معلم">معلم</option>
            <option value="مرشد">مرشد</option>
        </select>
        <select id="ageRange">
            <option value="" disabled selected>العمر...</option>
            <option value="اقل من 30">اقل من 30</option>
            <option value="من 30 الى 39">من 30 الى 39</option>
            <option value="من 40 الى 49">من 40 الى 49</option>
            <option value="من 50 الى 59">من 50 الى 59</option>
            <option value="60 فاكثر">60 فاكثر</option>
        </select>
        <select id="degree">
            <option value="" disabled selected>الشهادة...</option>
            <option value="بكالوريوس">بكالوريوس</option>
            <option value="ماجستير">ماجستير</option>
            <option value="دكتوراه">دكتوراه</option>
            <option value="اخرى">اخرى</option>
        </select>
        <select id="specialty">
            <option value="" disabled selected>الاختصاص...</option>
            <option value="اللغة العربية">اللغة العربية</option>
            <option value="الرياضيات">الرياضيات</option>
            <option value="عام">عام</option>
            <option value="اخرى">اخرى</option>
        </select>
        <select id="serviceYears">
            <option value="" disabled selected>الخدمة...</option>
            <option value="5 سنوات او اقل">5 سنوات او اقل</option>
            <option value="16 فاكثر">16 فاكثر</option>
        </select>
        <select id="status">
            <option value="" disabled selected>الحالة الوظيفية...</option>
            <option value="داخل قوة العمل">داخل قوة العمل</option>
            <option value="بعثة او زمالة دراسية">بعثة او زمالة دراسية</option>
            <option value="إجازة دراسية">إجازة دراسية</option>
            <option value="إجازة مصاحبة">إجازة مصاحبة</option>
            <option value="إجازة بدون راتب">إجازة بدون راتب</option>
            <option value="إجازة مرضية طويلة">إجازة مرضية طويلة</option>
            <option value="إجازة امومة">إجازة امومة</option>
            <option value="منسب الى جهات اخرى">منسب الى جهات اخرى</option>
            <option value="اجازة (4-5) سنوات">اجازة (4-5) سنوات</option>
        </select>
        <button id="addBtn" onclick="addRow()">إضافة</button>
    </div>

    <table id="table">
        <thead>
            <tr>
                <th style="width: 30px;">ت</th>
                <th>الاسم</th>
                <th>الوظيفة</th>
                <th>العمر</th>
                <th>الشهادة</th>
                <th>الاختصاص</th>
                <th>الخدمة</th>
                <th>الحالة</th>
                <th style="width: 120px;">الإجراءات</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button id="sendBtn" onclick="sendAll()">حفظ البيانات وتصدير PDF</button>
    
    <div id="overlay"></div>
    <div id="loading"><div class="loader"></div></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwhIPJE0drgs3BPzcfuCgQnXJYcz2SlbZaNoVdjZ8zn1q7xoUEA_mRNGaqV-zG7MEwE/exec"; 
    
    const options = {
        job: ["مدير", "معلم", "مرشد"],
        age: ["اقل من 30", "من 30 الى 39", "من 40 الى 49", "من 50 الى 59", "60 فاكثر"],
        degree: ["دورات تربوية", "دبلوم تعليمي", "دبلوم فنون جميلة", "دبلوم عام", "بكالوريوس تعليمي", "بكالوريوس عام", "دبلوم عالي", "ماجستير", "دكتوراه", "اخرى"],
        spec: ["التربية الاسلامية", "اللغة العربية", "اللغة الانكليزية", "اللغة الكردية", "الرياضيات", "العلوم", "الكيمياء", "الفيزياء", "الاجتماعيات", "التاريخ", "الجغرافية", "اقتصاد منزلي", "تربية خاصة", "علم نفس", "تربية فنية", "تربية رياضية", "حاسوب", "اللغة التركمانية", "اللغة السريانية", "عام", "اخرى"],
        service: ["5 سنوات او اقل", "من 6 الى 10", "من 11 الى 15", "16 فاكثر"],
        status: ["داخل قوة العمل", "بعثة او زمالة دراسية", "إجازة دراسية", "إجازة مصاحبة", "إجازة بدون راتب", "إجازة مرضية طويلة", "إجازة امومة", "منسب الى جهات اخرى", "اجازة (4-5) سنوات"]
    };

    function addRow(){
        const fields = ['name', 'job', 'ageRange', 'degree', 'specialty', 'serviceYears', 'status'];
        const values = fields.map(id => document.getElementById(id).value.trim());

        if(values.some(v => v === "")){ alert("يرجى ملء كافة الحقول."); return; }

        const row = document.querySelector("#table tbody").insertRow();
        row.innerHTML = `
            <td class="emp-id"></td>
            <td class="emp-name">${values[0]}</td>
            <td class="emp-job">${values[1]}</td>
            <td class="emp-age">${values[2]}</td>
            <td class="emp-degree">${values[3]}</td>
            <td class="emp-spec">${values[4]}</td>
            <td class="emp-serv">${values[5]}</td>
            <td class="emp-status">${values[6]}</td>
            <td>
                <button class="edit" onclick="editRow(this)">تعديل</button>
                <button class="delete" onclick="deleteRow(this)">حذف</button>
            </td>
        `;
        updateIds();
        resetInputs();
    }

    function updateIds(){
        document.querySelectorAll("#table tbody tr").forEach((row, i) => row.querySelector(".emp-id").innerText = i + 1);
    }

    function deleteRow(btn){ btn.closest('tr').remove(); updateIds(); }

    function resetInputs(){
        document.getElementById("name").value = "";
        document.querySelectorAll(".input-group select").forEach(s => s.selectedIndex = 0);
    }

    function editRow(btn) {
        const row = btn.closest('tr');
        const cells = {
            name: row.querySelector('.emp-name'), job: row.querySelector('.emp-job'),
            age: row.querySelector('.emp-age'), deg: row.querySelector('.emp-degree'),
            spec: row.querySelector('.emp-spec'), serv: row.querySelector('.emp-serv'),
            stat: row.querySelector('.emp-status')
        };

        if (btn.innerText === "تعديل") {
            btn.innerText = "حفظ"; btn.className = "save";
            cells.name.contentEditable = "true";
            cells.job.innerHTML = buildSelect(options.job, cells.job.innerText);
            cells.age.innerHTML = buildSelect(options.age, cells.age.innerText);
            cells.deg.innerHTML = buildSelect(options.degree, cells.deg.innerText);
            cells.spec.innerHTML = buildSelect(options.spec, cells.spec.innerText);
            cells.serv.innerHTML = buildSelect(options.service, cells.serv.innerText);
            cells.stat.innerHTML = buildSelect(options.status, cells.stat.innerText);
        } else {
            btn.innerText = "تعديل"; btn.className = "edit";
            cells.name.contentEditable = "false";
            Object.values(cells).forEach(c => { if(c.querySelector('select')) c.innerText = c.querySelector('select').value; });
        }
    }

    function buildSelect(opts, cur) {
        let s = `<select style="width:100%; font-size:10px;">`;
        opts.forEach(o => s += `<option value="${o}" ${o===cur?'selected':''}>${o}</option>`);
        return s + `</select>`;
    }

    async function sendAll(){
        const rows = document.querySelectorAll("#table tbody tr");
        if(rows.length === 0) return;

        const employees = Array.from(rows).map(row => ({
            id: row.querySelector('.emp-id').innerText,
            name: row.querySelector('.emp-name').innerText,
            job: getVal(row, '.emp-job'),
            age: getVal(row, '.emp-age'),
            degree: getVal(row, '.emp-degree'),
            specialty: getVal(row, '.emp-spec'),
            serviceYears: getVal(row, '.emp-serv'),
            status: getVal(row, '.emp-status')
        }));

        document.getElementById("loading").style.display = "block";
        document.getElementById("overlay").style.display = "block";

        try {
            await fetch(API, { method: "POST", body: JSON.stringify({ employees }) });
            alert("تم الحفظ بنجاح.");
            downloadPDF(employees);
            document.querySelector("#table tbody").innerHTML = "";
        } catch (e) {
            alert("حدث خطأ في الإرسال.");
        } finally {
            document.getElementById("loading").style.display = "none";
            document.getElementById("overlay").style.display = "none";
        }
    }

    function getVal(r, c) {
        const cell = r.querySelector(c);
        return cell.querySelector('select') ? cell.querySelector('select').value : cell.innerText;
    }

    function downloadPDF(data){
        const el = document.createElement("div");
        el.style.direction = "rtl"; el.style.padding = "10px";
        let html = `<h2 style="text-align:center">جدول بيانات الموظفين</h2>
            <table border="1" style="width:100%; border-collapse:collapse; text-align:center; font-size: 9px;">
            <tr style="background:#eee"><th>ت</th><th>الاسم</th><th>الوظيفة</th><th>العمر</th><th>الشهادة</th><th>الاختصاص</th><th>الخدمة</th><th>الحالة</th></tr>`;
        data.forEach(e => {
            html += `<tr><td>${e.id}</td><td>${e.name}</td><td>${e.job}</td><td>${e.age}</td><td>${e.degree}</td><td>${e.specialty}</td><td>${e.serviceYears}</td><td>${e.status}</td></tr>`;
        });
        el.innerHTML = html + `</table>`;
        html2pdf().set({ margin: 0.3, filename: 'report.pdf', jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(el).save();
    }
</script>
</body>
</html>
