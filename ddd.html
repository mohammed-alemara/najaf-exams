<!DOCTYPE html>
<html>
<head>
<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td{
border:1px solid #ddd;
padding:8px;
}

</style>
</head>

<body>

<div class="container">

<h3>Employee List</h3>

<input id="name" placeholder="Employee Name">
<input id="job" placeholder="Job">

<button onclick="addEmployee()">Add</button>

<table id="table">
<tr>
<th>Name</th>
<th>Job</th>
</tr>
</table>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyXLhf2jscX4fG_YPTm8_n7H1iDnExsORJ3rnYccpGWBmf4mTKxlw6VQnI2EZVK0DM/exec";

function addEmployee(){

let name = document.getElementById("name").value;
let job = document.getElementById("job").value;

let table = document.getElementById("table");
let row = table.insertRow();

row.insertCell(0).innerText = name;
row.insertCell(1).innerText = job;

fetch(scriptURL,{
method:"POST",
body: JSON.stringify({
name:name,
job:job
})
})

document.getElementById("name").value="";
document.getElementById("job").value="";
}

</script>

</body>
</html>
